<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Data Table with Search</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h2>Recipes Data</h2>
        
        <!-- Search Bar Section -->
        <div class="search-container">
            <input type="text" id="search-input" placeholder="Search by name, email or role...">
            <button id="search-btn">Search</button>
        </div>
        
        <div class="table-wrapper">
            <table class="fl-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Recipes Name</th>
                        <th>Picture</th>
                        <th>Title</th>
                        
                    </tr>
                </thead>
                <tbody id="table-body">
                     <tr>
                        <td colspan="5" class="loading">Loading data, please wait...</td>
                     </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script src="index.js"></script>
</body>
</html>
